services:
  - type: web
    name: jaso-portfolio-app
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PORTFOLIO_DATA_DIR
        value: /var/data/portfolio
    disk:
      name: portfolio-data
      mountPath: /var/data/portfolio
      sizeGB: 5
